<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распоред на Маси</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 40px;
            text-align: center;
        }

        h1, h2 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 600;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        textarea {
            height: 150px;
            resize: vertical;
            font-family: inherit;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #3498db;
        }

        /* Сугестии (Dropdown) */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .suggestion-item {
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background-color: #f1f3f5;
        }

        /* Резултат */
        .result-card {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: #e8f4fd;
            border: 1px solid #bee5eb;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-card h3 {
            font-size: 18px;
            color: #004085;
        }

        .table-number {
            font-size: 48px;
            font-weight: bold;
            color: #2980b9;
            margin-top: 10px;
        }

        /* Админ Секција */
        .admin-section {
            margin-top: 50px;
            border-top: 2px dashed #ddd;
            padding-top: 30px;
            width: 100%;
            max-width: 500px;
        }

        .instructions {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-align: left;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-save {
            background-color: #2ecc71;
            flex: 2;
        }

        .btn-save:hover {
            background-color: #27ae60;
        }

        .btn-clear {
            background-color: #e74c3c;
            flex: 1;
            font-size: 14px;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        .alert {
            margin-top: 10px;
            font-size: 14px;
            color: #27ae60;
            display: none;
            font-weight: 600;
        }
        
        .alert-danger {
            color: #c0392b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Пронајди ја твојата маса</h1>
        <div class="search-box">
            <input type="text" id="guestSearch" placeholder="Внеси име и презиме па стисни Enter..." autocomplete="off">
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div id="resultCard" class="result-card">
            <h3 id="guestNameResult"></h3>
            <p>Ве очекуваме на маса број:</p>
            <div class="table-number" id="tableNumber">--</div>
        </div>
    </div>

    <div class="admin-section">
        <h2>Админ Панел (Внес на неограничена листа)</h2>
        <p class="instructions">
            Внесете ги гостите во посебен ред, одвоени со запирка.<br>
            <strong>Пример:</strong><br>
            Столе Костадинов, 1<br>
            Марија Петрова, 5
        </p>
        <textarea id="guestListInput" placeholder="Име Презиме, број_маса&#10;Име Презиме, број_маса"></textarea>
        
        <div class="btn-group">
            <button class="btn-save" onclick="addGuestList()">Зачувај ја листата</button>
            <button class="btn-clear" onclick="clearDatabase()">Исчисти база</button>
        </div>
        
        <div id="adminAlert" class="alert">Листата со гости е успешно додадена!</div>
    </div>

    <script>
        const firebaseUrl = 'https://seating-plan-e5897-default-rtdb.europe-west1.firebasedatabase.app/guests.json';
        let allGuests = {};
        let currentMatches = []; // Локална низа за моменталните резултати од пребарувањето

        // 1. Вчитување на гостите од Firebase при стартување
        async function fetchGuests() {
            try {
                const response = await fetch(firebaseUrl);
                const data = await response.json();
                allGuests = data ? data : {};
            } catch (error) {
                console.error("Грешка при вчитување на податоците:", error);
            }
        }

        function normalizeText(text) {
            return text.toLowerCase().trim();
        }

        // Заедничка функција која го прикажува гостинот и го чисти Search полето
        function selectGuest(guest) {
            guestNameResult.textContent = guest.name;
            tableNumber.textContent = guest.table;
            resultCard.style.display = 'block';
            
            // КЛУЧНА ПРОМЕНА: Се чисти полето за пребарување и сугестиите веднаш
            searchInput.value = '';
            suggestionsContainer.innerHTML = '';
            currentMatches = [];
        }

        // 2. Логика за пребарување и сугестии (Live Search)
        const searchInput = document.getElementById('guestSearch');
        const suggestionsContainer = document.getElementById('suggestions');
        const resultCard = document.getElementById('resultCard');
        const guestNameResult = document.getElementById('guestNameResult');
        const tableNumber = document.getElementById('tableNumber');

        searchInput.addEventListener('input', () => {
            const query = normalizeText(searchInput.value);
            suggestionsContainer.innerHTML = '';
            currentMatches = [];
            
            if (!query) {
                return;
            }

            for (let id in allGuests) {
                const guest = allGuests[id];
                if (normalizeText(guest.name).includes(query)) {
                    currentMatches.push(guest);
                }
            }

            // Прикажи ги првите 5 сугестии
            currentMatches.slice(0, 5).forEach(guest => {
                const div = document.createElement('div');
                div.classList.add('suggestion-item');
                div.textContent = guest.name;
                div.addEventListener('click', () => {
                    selectGuest(guest); // Избери гост на клик
                });
                suggestionsContainer.appendChild(div);
            });
        });

        // КЛУЧНА ПРОМЕНА: Логика за притискање на "Enter"
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Спречи стандардно однесување на формата
                
                if (currentMatches.length > 0) {
                    // Ако има пронајдени сугестии, земи ја првата (најточната)
                    selectGuest(currentMatches[0]);
                } else if (searchInput.value.trim() !== '') {
                    // Ако корисникот напишал нешто што го нема воопшто во базата
                    alert('Гостинот не е пронајден во распоредот.');
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) {
                suggestionsContainer.innerHTML = '';
            }
        });

        // 3. Групно внесување на листа
        async function addGuestList() {
            const listInput = document.getElementById('guestListInput');
            const alertDiv = document.getElementById('adminAlert');
            const rawText = listInput.value.trim();

            if (!rawText) {
                alert('Ве молиме внесете податоци во полето!');
                return;
            }

            const lines = rawText.split('\n');
            const bulkData = {}; 
            let validGuestsCount = 0;

            for (let line of lines) {
                if (!line.trim()) continue;

                const lastCommaIndex = line.lastIndexOf(',');
                if (lastCommaIndex === -1) {
                    console.warn(`Прескокнат невалиден ред: "${line}". Недостасува запирка.`);
                    continue;
                }

                const name = line.substring(0, lastCommaIndex).trim();
                const table = line.substring(lastCommaIndex + 1).trim();

                if (name && table) {
                    const uniqueId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                    
                    bulkData[uniqueId] = {
                        name: name,
                        table: table
                    };
                    validGuestsCount++;
                }
            }

            if (validGuestsCount === 0) {
                alert('Не беше пронајден валиден формат кај ниту еден гост. Проверете го примерот.');
                return;
            }

            try {
                const response = await fetch(firebaseUrl, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bulkData)
                });

                if (response.ok) {
                    alertDiv.className = "alert"; 
                    alertDiv.textContent = `Успешно додадовте ${validGuestsCount} гости одеднаш!`;
                    alertDiv.style.display = 'block';
                    listInput.value = ''; 
                    resultCard.style.display = 'none';
                    searchInput.value = '';

                    await fetchGuests();

                    setTimeout(() => {
                        alertDiv.style.display = 'none';
                    }, 4000);
                } else {
                    throw new Error('Проблем со одговорот од базата.');
                }
            } catch (error) {
                console.error("Грешка при зачувување:", error);
                alert("Имаше проблем при зачувување на листата.");
            }
        }

        // 4. Комплетно празнење на Firebase базата
        async function clearDatabase() {
            const confirmClear = confirm("ВНИМАНИЕ: Дали сте сигурни дека сакате комплетно да ги ИЗБРИШЕТЕ сите гости од базата? Оваа акција е неповратна.");
            if (!confirmClear) return;

            const alertDiv = document.getElementById('adminAlert');

            try {
                const response = await fetch(firebaseUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}) 
                });

                if (response.ok) {
                    alertDiv.className = "alert alert-danger"; 
                    alertDiv.textContent = "Базата е успешно испразнета!";
                    alertDiv.style.display = 'block';
                    
                    document.getElementById('guestListInput').value = '';
                    resultCard.style.display = 'none';
                    searchInput.value = '';

                    await fetchGuests();

                    setTimeout(() => {
                        alertDiv.style.display = 'none';
                    }, 4000);
                } else {
                    throw new Error('Базата одби да се избрише.');
                }
            } catch (error) {
                console.error("Грешка при бришење на базата:", error);
                alert("Имаше проблем при бришење на базата.");
            }
        }

        window.onload = fetchGuests;
    </script>
</body>
</html>
