<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распоред на Маси</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #1a365d;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        .search-box {
            position: relative;
            width: 100%;
            margin-bottom: 5px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
            background-color: #f8fafc;
            color: #2d3748;
        }

        input[type="text"] {
            padding-right: 45px; /* Простор за X копчето */
        }

        textarea {
            height: 160px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.5;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #3182ce;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(49, 130, 206, 0.15);
        }

        /* Копче за бришење внатре во Search полето */
        .clear-search-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            padding: 5px;
            display: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        .clear-search-btn:hover {
            color: #4a5568;
        }

        /* Прекрасни Сугестии (Dropdown) */
        .suggestions {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            max-height: 240px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            padding: 6px 0;
        }

        .suggestion-item {
            padding: 14px 20px;
            text-align: left;
            cursor: pointer;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s ease;
        }

        .suggestion-item:hover {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding-left: 25px; /* Суптилен ефект на поместување */
        }

        /* Картичка со резултат (Супер Модерна) */
        .result-card {
            margin-top: 30px;
            padding: 30px 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, #e6fffa 0%, #b2f5ea 100%);
            border: 1px solid #81e6d9;
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 20px rgba(134, 239, 172, 0.2);
        }

        .result-card h3 {
            font-size: 22px;
            color: #0b6353;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-card p {
            font-size: 15px;
            color: #1d4ed8;
            font-weight: 500;
        }

        .table-number {
            font-size: 64px;
            font-weight: 800;
            color: #2b6cb0;
            margin-top: 10px;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.8);
            letter-spacing: -1px;
        }

        /* Админ Секција */
        .admin-section {
            margin-top: 40px;
            border-top: 2px dashed #cbd5e0;
            padding-top: 35px;
            width: 100%;
            max-width: 550px;
        }

        .instructions {
            font-size: 13px;
            color: #718096;
            margin-bottom: 15px;
            text-align: left;
            line-height: 1.6;
            background: #edf2f7;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #718096;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        button {
            width: 100%;
            padding: 16px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-save {
            background-color: #38a169;
            flex: 2;
        }

        .btn-save:hover {
            background-color: #2f855a;
            box-shadow: 0 6px 12px rgba(56, 161, 105, 0.2);
        }

        .btn-clear {
            background-color: #e53e3e;
            flex: 1;
            font-size: 14px;
        }

        .btn-clear:hover {
            background-color: #c53030;
            box-shadow: 0 6px 12px rgba(229, 62, 62, 0.2);
        }

        /* Известувања */
        .alert {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            background-color: #c6f6d5;
            color: #22543d;
            display: none;
            font-weight: 600;
            animation: fadeIn 0.3s ease;
        }
        
        .alert-danger {
            background-color: #fed7d7;
            color: #742a2a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Пронајди ја твојата маса</h1>
        <div class="search-box">
            <input type="text" id="guestSearch" placeholder="Внеси име и презиме..." autocomplete="off">
            <button id="clearSearchX" class="clear-search-btn" onclick="resetSearchField()">&times;</button>
            <div id="suggestions" class="suggestions" style="display: none;"></div>
        </div>

        <div id="resultCard" class="result-card">
            <h3 id="guestNameResult"></h3>
            <p>Ве очекуваме на маса број:</p>
            <div class="table-number" id="tableNumber">--</div>
        </div>
    </div>

    <!--<div class="admin-section">
        <div class="container" style="margin-top: 0;">
            <h2>Админ Панел</h2>
            <div class="instructions">
                Внесете ги гостите во посебен ред, одвоени со запирка.<br>
                <strong>Пример:</strong> Столе Костадинов, 1
            </div>
            <textarea id="guestListInput" placeholder="Име Презиме, број_маса&#10;Име Презиме, број_маса"></textarea>
            
            <div class="btn-group">
                <button class="btn-save" onclick="addGuestList()">Зачувај ја листата</button>
                <button class="btn-clear" onclick="clearDatabase()">Исчисти база</button>
            </div>
            
            <div id="adminAlert" class="alert">Листата со гости е успешно додадена!</div>
        </div>
    </div>-->

    <script>
        const firebaseUrl = 'https://seating-plan-e5897-default-rtdb.europe-west1.firebasedatabase.app/guests.json';
        let allGuests = {};
        let currentMatches = [];

        // 1. Вчитување на гостите од Firebase при стартување
        async function fetchGuests() {
            try {
                const response = await fetch(firebaseUrl);
                const data = await response.json();
                allGuests = data ? data : {};
            } catch (error) {
                console.error("Грешка при вчитување на податоците:", error);
            }
        }

        function normalizeText(text) {
            return text.toLowerCase().trim();
        }

        // Чистење на полето преку "X" копчето
        function resetSearchField() {
            searchInput.value = '';
            suggestionsContainer.innerHTML = '';
            suggestionsContainer.style.display = 'none';
            clearSearchX.style.display = 'none';
            currentMatches = [];
            searchInput.focus();
        }

        // Прикажување резултат и празнење на Search
        function selectGuest(guest) {
            guestNameResult.textContent = guest.name;
            tableNumber.textContent = guest.table;
            resultCard.style.display = 'block';
            
            searchInput.value = '';
            suggestionsContainer.innerHTML = '';
            suggestionsContainer.style.display = 'none';
            clearSearchX.style.display = 'none';
            currentMatches = [];
        }

        // 2. Логика за пребарување и сугестии (Live Search)
        const searchInput = document.getElementById('guestSearch');
        const suggestionsContainer = document.getElementById('suggestions');
        const clearSearchX = document.getElementById('clearSearchX');
        const resultCard = document.getElementById('resultCard');
        const guestNameResult = document.getElementById('guestNameResult');
        const tableNumber = document.getElementById('tableNumber');

        searchInput.addEventListener('input', () => {
            const query = normalizeText(searchInput.value);
            suggestionsContainer.innerHTML = '';
            currentMatches = [];
            
            if (!query) {
                suggestionsContainer.style.display = 'none';
                clearSearchX.style.display = 'none';
                return;
            }

            clearSearchX.style.display = 'block';

            for (let id in allGuests) {
                const guest = allGuests[id];
                if (normalizeText(guest.name).includes(query)) {
                    currentMatches.push(guest);
                }
            }

            if(currentMatches.length > 0) {
                suggestionsContainer.style.display = 'block';
                currentMatches.slice(0, 5).forEach(guest => {
                    const div = document.createElement('div');
                    div.classList.add('suggestion-item');
                    div.textContent = guest.name;
                    div.addEventListener('click', () => {
                        selectGuest(guest);
                    });
                    suggestionsContainer.appendChild(div);
                });
            } else {
                suggestionsContainer.style.display = 'none';
            }
        });

        // Логика за Enter
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (currentMatches.length > 0) {
                    selectGuest(currentMatches[0]);
                } else if (searchInput.value.trim() !== '') {
                    alert('Гостинот не е пронајден во распоредот.');
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) {
                suggestionsContainer.innerHTML = '';
                suggestionsContainer.style.display = 'none';
            }
        });

        // 3. Групно внесување на листа
        async function addGuestList() {
            const listInput = document.getElementById('guestListInput');
            const alertDiv = document.getElementById('adminAlert');
            const rawText = listInput.value.trim();

            if (!rawText) {
                alert('Ве молиме внесете податоци во полето!');
                return;
            }

            const lines = rawText.split('\n');
            const bulkData = {}; 
            let validGuestsCount = 0;

            for (let line of lines) {
                if (!line.trim()) continue;

                const lastCommaIndex = line.lastIndexOf(',');
                if (lastCommaIndex === -1) {
                    continue;
                }

                const name = line.substring(0, lastCommaIndex).trim();
                const table = line.substring(lastCommaIndex + 1).trim();

                if (name && table) {
                    const uniqueId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                    bulkData[uniqueId] = { name: name, table: table };
                    validGuestsCount++;
                }
            }

            if (validGuestsCount === 0) {
                alert('Не беше пронајден валиден формат кај ниту еден гост.');
                return;
            }

            try {
                const response = await fetch(firebaseUrl, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bulkData)
                });

                if (response.ok) {
                    alertDiv.className = "alert"; 
                    alertDiv.textContent = `Успешно додадовте ${validGuestsCount} гости!`;
                    alertDiv.style.display = 'block';
                    listInput.value = ''; 
                    resultCard.style.display = 'none';
                    resetSearchField();

                    await fetchGuests();
                    setTimeout(() => { alertDiv.style.display = 'none'; }, 4000);
                }
            } catch (error) {
                alert("Имаше проблем при зачувување.");
            }
        }

        // 4. Комплетно празнење на базата
        async function clearDatabase() {
            const confirmClear = confirm("ВНИМАНИЕ: Дали сте сигурни дека сакате комплетно да ги ИЗБРИШЕТЕ сите гости од базата?");
            if (!confirmClear) return;

            const alertDiv = document.getElementById('adminAlert');

            try {
                const response = await fetch(firebaseUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}) 
                });

                if (response.ok) {
                    alertDiv.className = "alert alert-danger"; 
                    alertDiv.textContent = "Базата е успешно испразнета!";
                    alertDiv.style.display = 'block';
                    
                    document.getElementById('guestListInput').value = '';
                    resultCard.style.display = 'none';
                    resetSearchField();

                    await fetchGuests();
                    setTimeout(() => { alertDiv.style.display = 'none'; }, 4000);
                }
            } catch (error) {
                alert("Имаше проблем при бришење на базата.");
            }
        }

        window.onload = fetchGuests;
    </script>
</body>
</html>
